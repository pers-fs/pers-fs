name: Update Profile

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        run: python scripts/fetch_contributions.py pers-fs contributions.json

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py contributions.json assets/contrib-heatmap.svg

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/contrib-heatmap.svg
          git diff --staged --quiet || (git commit -m "chore: update heatmap [skip ci]" && git push)
